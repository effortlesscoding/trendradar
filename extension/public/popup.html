<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reddit Research Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --border: #252a35;
      --accent: #ff4500;
      --accent-dim: rgba(255, 69, 0, 0.15);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 400px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 0 0 12px;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
    }

    .section {
      padding: 12px 16px 0;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    textarea, input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    textarea:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    textarea { height: 120px; }
    input[type="number"] { width: 100px; }

    textarea:disabled, input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      padding: 12px 16px 0;
    }

    .field { flex: 1; }

    .btn-group {
      display: flex;
      gap: 8px;
      padding: 12px 16px 0;
    }

    button {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }

    #startBtn {
      background: var(--accent);
      color: white;
      flex: 1;
    }
    #startBtn:hover:not(:disabled) { background: #e03d00; }
    #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #stopBtn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #stopBtn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    #stopBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #resetBtn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    #resetBtn:hover { color: var(--text); border-color: var(--muted); }

    .global-status {
      margin: 10px 16px 0;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--mono);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .global-status.running { color: var(--yellow); border-color: rgba(234,179,8,0.3); }
    .global-status.done { color: var(--green); border-color: rgba(34,197,94,0.3); }
    .global-status.analyzing { color: var(--blue); border-color: rgba(59,130,246,0.3); }

    #apiError {
      display: none;
      margin: 8px 16px 0;
      padding: 7px 10px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      font-size: 11px;
      color: var(--red);
      font-family: var(--mono);
    }

    #statusContainer {
      padding: 8px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
    }

    .badge-sub {
      font-family: var(--mono);
      color: var(--text);
      flex: 1;
    }

    .badge-status {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 10px;
    }

    .badge-count {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
    }

    .badge-pending .badge-status { color: var(--muted); }
    .badge-scraping .badge-status { color: var(--yellow); }
    .badge-scraping { border-color: rgba(234,179,8,0.2); }
    .badge-done .badge-status { color: var(--green); }
    .badge-done { border-color: rgba(34,197,94,0.2); }
    .badge-error .badge-status { color: var(--red); }
    .badge-error { border-color: rgba(239,68,68,0.2); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 12px 16px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <div class="header-text">
      <h1>Reddit Research Tool</h1>
      <p>YouTube content gap finder for AI/CS</p>
    </div>
  </div>

  <div class="section">
    <label>Subreddits (one per line)</label>
    <textarea id="subreddits" placeholder="MachineLearning&#10;learnprogramming&#10;artificial"></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label>Posts per subreddit</label>
      <input type="number" id="postsPerSub" min="10" max="200" value="50" />
    </div>
  </div>

  <div class="btn-group">
    <button id="startBtn">▶ Start Scrape</button>
    <button id="stopBtn" disabled>■ Stop</button>
    <button id="resetBtn">↺</button>
  </div>

  <div id="apiError"></div>
  <div id="globalStatus" class="global-status">Ready</div>

  <div class="divider"></div>
  <div id="statusContainer"></div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
